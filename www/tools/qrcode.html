<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线二维码生成器 — SVG矢量/自定义颜色/免费</title>
  <meta name="description" content="免费在线二维码生成器，Rust WASM 驱动。可自定义颜色和尺寸，输出 SVG 矢量格式（无损放大），纯浏览器本地生成。" />
  <meta name="keywords" content="二维码生成,QR码,在线二维码,SVG二维码,免费二维码" />
  <link rel="canonical" href="https://image-toolbox.pages.dev/tools/qrcode.html" />
  <meta name="robots" content="index, follow" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header class="header">
    <a href="/" class="back-link">← 返回工具箱</a>
    <h1 class="header__title">🔳 二维码生成</h1>
    <p class="header__subtitle">SVG 矢量输出 · 可调颜色和尺寸 · Rust WASM 驱动</p>
  </header>
  <main class="main tool-page">
    <div class="tool-panel">
      <textarea class="tool-textarea" id="qrInput" placeholder="输入文本或网址…" rows="3">https://image-toolbox.pages.dev</textarea>
      <div class="param-row">
        <span class="param-row__title">📏 尺寸</span>
        <input type="range" class="slider-group__input" id="qrSize" min="100" max="600" value="300" step="10" style="flex:1" />
        <span id="qrSizeVal" style="min-width:3rem;text-align:right">300px</span>
      </div>
      <div class="param-row">
        <span class="param-row__title">⚫ 前景色</span>
        <input type="color" class="param-input" id="qrDark" value="#000000" style="width:60px;height:32px;padding:2px" />
        <span class="param-row__title">⚪ 背景色</span>
        <input type="color" class="param-input" id="qrLight" value="#ffffff" style="width:60px;height:32px;padding:2px" />
      </div>
      <div class="qr-preview" id="qrPreview"></div>
      <div class="tools__grid"><button class="tool-btn" id="qrDownloadBtn">💾 下载 SVG</button></div>
    </div>
  </main>
  <footer class="footer"><p>Built with 🦀 Rust + 🕸 WebAssembly</p></footer>
  <script type="module" src="/src/tools/qrcode.js"></script>
</body>
</html>
