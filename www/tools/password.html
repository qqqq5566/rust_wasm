<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线密码生成器 — 随机安全密码/自定义长度字符集</title>
  <meta name="description" content="免费在线密码生成器，支持自定义长度和字符集（大写/小写/数字/符号），含密码强度检测。纯浏览器本地运行。" />
  <meta name="keywords" content="密码生成器,随机密码,安全密码,在线密码工具,强密码生成" />
  <link rel="canonical" href="https://use-tools.sendersun912687572.workers.dev/tools/password.html" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header class="header"><a href="/" class="back-link">← 返回工具箱</a><h1 class="header__title">🔑 密码生成器</h1></header>
  <main class="main tool-page">
    <div class="tool-panel">
      <div class="slider-group"><label class="slider-group__label">📏 长度: <span id="pwLenVal">16</span></label><input type="range" class="slider-group__input" id="pwLen" min="4" max="64" value="16" step="1" /></div>
      <div class="tools__grid">
        <label class="tool-check"><input type="checkbox" id="pwUpper" checked /> 大写 (A-Z)</label>
        <label class="tool-check"><input type="checkbox" id="pwLower" checked /> 小写 (a-z)</label>
        <label class="tool-check"><input type="checkbox" id="pwDigits" checked /> 数字 (0-9)</label>
        <label class="tool-check"><input type="checkbox" id="pwSymbols" /> 符号 (!@#$)</label>
      </div>
      <div class="hash-result__box" id="pwOutput" style="font-family:monospace;word-break:break-all;font-size:1.2rem"></div>
      <div class="pw-strength" id="pwStrength"><div class="pw-strength__bar" id="pwStrengthBar"></div></div>
      <div class="tools__grid" style="margin-top:0.5rem">
        <button class="tool-btn" id="pwGenBtn">🎲 重新生成</button>
        <button class="tool-btn tool-btn--sm" id="pwCopyBtn">📋 复制</button>
      </div>
    </div>
  </main>
  <footer class="footer"><p>Built with 🦀 Rust + 🕸 WebAssembly + ⚡ Vite</p></footer>
  <script type="module" src="/src/tools/password.js"></script>
</body>
</html>
